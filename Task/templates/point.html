<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}{% endblock title %}
    </title>
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <!-- cssanimation.io - Core CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cssanimation@1.0.0/cssanimation.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

     <style>
        html,
body {
    height: 100%;
    margin: 0;
    padding: 0;
    
}

body {
    display: flex;
    flex-direction: column;
}

/* Push footer down */
.clambtn {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 20px;
    padding-bottom: 100px;
}

/* Footer fixed at bottom */
footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 10px;
    z-index: 1000;
}

/* Responsive image */
.clambtn img {
    width: 70vw;
    height: 70vw;
    max-width: 20rem;
    max-height: 20rem;
}
    </style>
    {% if messages %}
{% for message in messages %}
<div class="alert 
    {% if message.tags == 'error' %} alert-danger
    {% elif message.tags == 'success' %} alert-success
    {% elif message.tags == 'warning' %} alert-warning
    {% else %} alert-info
    {% endif %}
    alert-dismissible fade show"
    
    role="alert"
    
    style="
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        min-width: 250px;
    ">

  <strong style="
    {% if message.tags == 'error' %} color: red;
    {% elif message.tags == 'success' %} color: green;
    {% elif message.tags == 'warning' %} color: orange;
    {% else %} color: blue;
    {% endif %}
  ">
      {{ message }}
  </strong>

  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endif %}

    <div>
        <div style="
            justify-content: center;
            align-items: center;
            display: flex;
            font-size: 24px;
            font-family: Arial, sans-serif;
            margin: 12px;
            padding: 12px;

            ">
            <p>Avaliable task</p>
        </div>
        <div style="
            justify-content: center;
            align-items: center;
            display: flex;
            font-size: 18px;
            font-family: Arial, sans-serif;
            margin: 12px;
            padding: 12px;

            ">
            <p>Complete any task and receive instant rewards!</p>
        </div>

        
    
        <ul class="nav nav-pills nav-fill gap-2 p-1 small  rounded-5 shadow-sm" id="pillNav2" role="tablist"
        style="background:  linear-gradient(135deg, #06152B, #0A1F3F, #003B6F, #00CFFF, #4DEBFF);"
        style="--bs-nav-link-color: var(--bs-white); --bs-nav-pills-link-active-color: var(--bs-primary); --bs-nav-pills-link-active-bg: var(--bs-white);" >

        
            <li class="nav-item" role="presentation">
                <button class="nav-link active rounded-5" id="home-tab2" data-bs-toggle="tab" type="button" role="tab" aria-selected="true">Task</button>
            </li>
        

        
            <li class="nav-item" role="presentation">
                 <a href="{% url 'Task:point' %}" class="nav-link rounded-5 {% if request.path == '/Task/point/' %}active{% endif %}">point</a></li>
            </li>
        

            <li class="nav-item" role="presentation">
                    <a href="{% url 'Task:complect' %}" class="nav-link rounded-5 {% if request.path == '/Task/complect/' %}active{% endif %}">complet</a></li>
        </ul>


    

   
    
  
    {% include "foot/footer.html" %}




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
