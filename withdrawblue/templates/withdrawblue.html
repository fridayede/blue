<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Icon with Image</title>
    <!-- Bootstrap Icons CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        .wallet-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .wallet-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .wallet-icon {
            font-size: 12rem;
            color: #4361ee;
            display: block;
            filter: drop-shadow(0 10px 15px rgba(67, 97, 238, 0.3));
            transition: transform 0.3s ease;
        }
        
        .wallet-icon:hover {
            transform: scale(1.05);
        }
        
        .profile-image {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 17px;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        
        .profile-image:hover {
            transform: translate(-50%, -50%) scale(1.1);
            border-color: #4361ee;
        }
        
        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        /* h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: #333;
            font-size: 1.5rem;
        } */
    </style>
</head>
<body>
    <li class="nav-item" role="presentation" style="position: absolute; top: 1rem; left: 1rem; list-style: none;">
                    <a href="{% url 'Home:clam' %}" class="nav-link rounded-5 {% if request.path == '/Home/clam/' %}active{% endif %}"><i class="bi bi-house-door " style="font-size:2rem; "></i> </a></li>
    <div class="wallet-container">
        <h1>Digital Wallet</h1>
        <div class="wallet-wrapper">
            <!-- Wallet Icon -->
            <i class="bi bi-wallet2 wallet-icon"></i>
            
            <!-- Image inside wallet -->
            <div class="profile-image">
                
                <img src="{% static 'image/image.png' %}" alt="Profile">
            </div>
        </div>
        <p style="text-align: center; margin-top: 2rem; color: #666;">
            Your digital identity
        </p>
    </div>
    
</body>
</html>
