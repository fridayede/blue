{% extends "layout.html" %}
{% load static %}
{% block title %}Reset Password{% endblock title %}

{% block content %}
{% if messages %}
{% for message in messages %}
<div class="alert 
    {% if message.tags == 'error' %} alert-danger
    {% elif message.tags == 'success' %} alert-success
    {% elif message.tags == 'warning' %} alert-warning
    {% else %} alert-info
    {% endif %}
    alert-dismissible fade show"
    
    role="alert"
    
    style="
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        min-width: 250px;
    ">

  <strong style="
    {% if message.tags == 'error' %} color: red;
    {% elif message.tags == 'success' %} color: green;
    {% elif message.tags == 'warning' %} color: orange;
    {% else %} color: blue;
    {% endif %}
  ">
      {{ message }}
  </strong>

  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endfor %}
{% endif %}
<div class="page">
    

    <div class="formconterner">

        <div class="login"><strong>RESET PASSWORD</strong></div>

        <div action="{% url 'Account:resetPassword' %}" class="form">
            <form method="post">
                {% csrf_token %}

                

                <div class="input-group password-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email" required name="email">
                </div>

                <div class="btn-box">
                    <button type="submit" class="btn"><strong>Submit</strong></button>
                </div>

            </form>
        </div>
        
        
    </div>

 
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
{% endblock content %}
