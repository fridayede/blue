<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Referral System</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 420px;
        background: #1e293b;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        text-align: center;
    }

    h2 {
        margin-bottom: 20px;
        font-size: 22px;
        color: #38bdf8;
    }

    .stats {
        background: #0f172a;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        font-size: 16px;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        margin-bottom: 15px;
        background: #0f172a;
        color: #38bdf8;
        font-size: 14px;
        text-align: center;
    }

    .btn {
        width: 100%;
        padding: 12px;
        margin: 6px 0;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
        transition: 0.2s;
    }

    .copy {
        background: #22c55e;
        color: white;
    }

    .copy:hover {
        background: #16a34a;
    }

    .share {
        background: #3b82f6;
        color: white;
    }

    .share:hover {
        background: #2563eb;
    }

    .note {
        margin-top: 15px;
        font-size: 12px;
        color: #94a3b8;
    }
</style>

</head>

<body>
     <li class="nav-item" role="presentation" style="position: absolute; top: 1rem; left: 1rem; list-style: none;">
                    <a href="{% url 'Home:clam' %}" class="nav-link rounded-5 {% if request.path == '/Home/clam/' %}active{% endif %}"><i class="bi bi-house-door " style="font-size:2rem; "></i> </a></li>

<div class="container">

    <h2>🎯 Referral System</h2>

    <div class="stats">
        Total Referrals: <strong>{{ referral.referral_count }}</strong>
    </div>

    <input type="text" value="{{ referral_link }}" id="refLink" readonly>

    <button class="btn copy" onclick="copyLink()">Copy Link</button>
    <button class="btn share" onclick="shareLink()">Share</button>

    <div class="note">
        Invite friends and earn rewards 🚀
    </div>

</div>

<script>
function copyLink(){
    navigator.clipboard.writeText(
        document.getElementById("refLink").value
    );
    alert("Link copied!");
}

function shareLink(){

    let link = document.getElementById("refLink").value;

    if (navigator.share) {
        navigator.share({
            title: "Join my app",
            text: "Use my referral link",
            url: link
        });
    } else {
        window.open(
            `https://t.me/share/url?url=${encodeURIComponent(link)}`,
            "_blank"
        );
    }
}
</script>

</body>
</html>
